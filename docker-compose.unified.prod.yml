services:
  api:
    container_name: ${PROJECT_SLUG}-api
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      APP_PORT: ${APP_PORT:-3000}
      PORT: ${APP_PORT:-3000}
      API_PREFIX: ${API_PREFIX:-api/v1}
      MONGODB_URI: ${MONGODB_URI}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN}
      CACHE_TTL: ${CACHE_TTL:-300}
      CACHE_MAX: ${CACHE_MAX:-100}
      THROTTLE_TTL: ${THROTTLE_TTL:-60}
      THROTTLE_LIMIT: ${THROTTLE_LIMIT:-100}
    expose:
      - "${APP_PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget -qO- http://127.0.0.1:${APP_PORT:-3000}/api/v1/health >/dev/null || exit 1",
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=h11ghh0jcmv7eftiqv942awt
      - traefik.http.services.enginner-api.loadbalancer.server.port=3000

  frontend:
    container_name: ${PROJECT_SLUG}-frontend
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
        VITE_SOCKET_URL: ${VITE_SOCKET_URL}
    restart: unless-stopped
    expose:
      - "80"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - app-network
      - platform-network
    labels:
      - traefik.docker.network=h11ghh0jcmv7eftiqv942awt
      - traefik.http.services.enginner-frontend.loadbalancer.server.port=80

networks:
  app-network:
    name: ${PROJECT_SLUG}-network
    driver: bridge
  platform-network:
    external: true
    name: platform-network
